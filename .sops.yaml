keys:
  # Public Age recipient derived from the `mikl-974` SSH public key.
  # The matching private key / derived Age identity must never be committed.
  - &mfo age1j9nearzgw8k859r0re0r4uzejxr67sg5glfhnhrzuu5e5f63pyesyvdche
  # Local Age recipient generated by `nix run .#init-keys`.
  # This key stays local to the workstation checkout and is useful for
  # local bootstrap flows such as OrbStack cloud-init.
  - &mfo_local age1r6m227prdlqykz84lgkqg34gw6ha3ypfkf00usqfynxc5lwwuyfs26zf4z

# Per-path creation rules.
#
# The canonical project recipient is `mfo`. `mfo_local` is an additional local
# workstation recipient for bootstrap flows. Existing encrypted files must be
# realigned with `sops updatekeys` after changing this file.
creation_rules:
  # Cross-cutting secrets (admin email, ...).
  - path_regex: ^secrets/common\.(yaml|yml|json|env|ini)$
    key_groups:
      - age:
          - *mfo
          - *mfo_local

  # Per-host secrets (passwords, ssh host keys, tailscale auth keys).
  - path_regex: ^secrets/hosts/.*\.(yaml|yml|json|env|ini)$
    key_groups:
      - age:
          - *mfo
          - *mfo_local

  # Per-stack secrets (tokens, db passwords, ...).
  # Keys here MUST match the `secrets` field of the corresponding
  # `stacks/<stack>/stack.nix` contract.
  - path_regex: ^secrets/stacks/.*\.(yaml|yml|json|env|ini)$
    key_groups:
      - age:
          - *mfo
          - *mfo_local

  # Per-cloud-provider secrets (subscription / account / project ids,
  # operator credentials when not provided via environment variables).
  - path_regex: ^secrets/cloud/.*\.(yaml|yml|json|env|ini)$
    key_groups:
      - age:
          - *mfo
          - *mfo_local
