# cloud-init user-data template for the `orbstack` NixOS VM.
#
# This file is VERSIONED but contains placeholders only. It is rendered
# locally into `secrets/keys/orbstack-cloud-init.yaml` (gitignored) by:
#
#     nix run .#orbstack-cloud-init
#
# The rendered file is then passed to OrbStack at VM creation:
#
#     orb create -a arm64 -u root \
#       --user-data secrets/keys/orbstack-cloud-init.yaml \
#       nixos orbstack
#
# Placeholder syntax and substitution rules: see
# scripts/render-orbstack-cloud-init.sh.
#
#cloud-config
hostname: orbstack
manage_etc_hosts: true

users:
  - name: root
    ssh_authorized_keys:
      - {{SSH_AUTHORIZED_KEY}}
  - name: mfo
    ssh_authorized_keys:
      - {{SSH_AUTHORIZED_KEY}}

write_files:
  - path: /var/lib/sops-nix/key.txt
    permissions: '0600'
    owner: root:root
    content: |
{{AGE_PRIVATE_KEY_BLOCK}}

runcmd:
  - [ /run/current-system/sw/bin/mkdir, -p, /etc/infra ]
  - [ /run/current-system/sw/bin/git, clone, --branch, {{INFRA_REPO_BRANCH}}, {{INFRA_REPO_URL}}, /etc/infra ]
  - [ /run/current-system/sw/bin/nixos-rebuild, switch, --flake, /etc/infra#orbstack ]

final_message: "orbstack VM bootstrap done — reachable via ssh mfo@orbstack@orb"
